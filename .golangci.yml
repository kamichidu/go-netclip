version: "2"

run:
  timeout: 5m
  relative-path-mode: cfg

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: true
      print-linter-name: true

linters:
  default: none
  enable:
    - govet
    - staticcheck

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
